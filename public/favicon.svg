  <circle cx="50" cy="18" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="68" cy="24" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="32" cy="24" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="80" cy="38" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="20" cy="38" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="84" cy="55" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="16" cy="55" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="76" cy="72" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="24" cy="72" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
  <circle cx="58" cy="83" r="3.8" fill="none" stroke="#C08C00" stroke-width="1.4"/>
