<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Crybaby Golf — Golf's Social Scoring App</title>
    <meta name="description" content="Golf's social scoring app. Track rounds, compete with friends, and settle the score." />
    <meta name="author" content="Crybaby Golf" />

    <!-- Theme color (Android browser chrome + PWA) -->
    <meta name="theme-color" content="#2d8653" />

    <!-- iOS Web App (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Crybaby" />
    <link rel="apple-touch-icon" href="/images/logo.png" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="any" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crybaby Golf" />
    <meta property="og:title" content="Crybaby Golf — Golf's Social Scoring App" />
    <meta property="og:description" content="Track rounds, put money on it, and let the trash talk begin." />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Crybaby Golf — Golf's Social Scoring App" />
    <meta name="twitter:description" content="Track rounds, put money on it, and let the trash talk begin." />
    <meta name="twitter:image" content="/og-image.svg" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
